<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="gitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="sbGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="40" y1="0" x2="40" y2="520"/>
    <line x1="80" y1="0" x2="80" y2="520"/>
    <line x1="120" y1="0" x2="120" y2="520"/>
    <line x1="160" y1="0" x2="160" y2="520"/>
    <line x1="200" y1="0" x2="200" y2="520"/>
    <line x1="240" y1="0" x2="240" y2="520"/>
    <line x1="280" y1="0" x2="280" y2="520"/>
    <line x1="320" y1="0" x2="320" y2="520"/>
    <line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="400" y1="0" x2="400" y2="520"/>
    <line x1="440" y1="0" x2="440" y2="520"/>
    <line x1="480" y1="0" x2="480" y2="520"/>
    <line x1="520" y1="0" x2="520" y2="520"/>
    <line x1="560" y1="0" x2="560" y2="520"/>
    <line x1="600" y1="0" x2="600" y2="520"/>
    <line x1="640" y1="0" x2="640" y2="520"/>
    <line x1="680" y1="0" x2="680" y2="520"/>
    <line x1="720" y1="0" x2="720" y2="520"/>
    <line x1="760" y1="0" x2="760" y2="520"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600" letter-spacing="3" font-family="'Courier New', monospace">REVIEWMATE · STORYBOOK SKILL FLOW</text>

  <!-- ── USER INPUT ── -->
  <rect x="270" y="56" width="260" height="48" rx="10" fill="none" stroke="#1e1e2e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="75" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600" letter-spacing="1">USER RUNS</text>
  <text x="400" y="94" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="700" font-family="'Courier New', monospace">/storybook-generator</text>

  <!-- Arrow down to git-diff -->
  <line x1="400" y1="104" x2="400" y2="136" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- ── GIT-DIFF BOX ── -->
  <rect x="220" y="140" width="360" height="100" rx="12" fill="#12121a" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
  <rect x="220" y="140" width="360" height="4" rx="2" fill="url(#gitGrad)"/>

  <!-- git-diff label -->
  <text x="248" y="162" font-size="10" fill="#f59e0b" font-weight="700" letter-spacing="2" font-family="'Courier New', monospace">/git-diff</text>
  <circle cx="354" cy="158" r="4" fill="#f59e0b" opacity="0.6"/>
  <text x="364" y="163" font-size="10" fill="#94a3b8">auto-invoked</text>

  <!-- git-diff steps -->
  <circle cx="244" cy="181" r="8" fill="rgba(245,158,11,0.15)"/>
  <text x="244" y="185" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="700">1</text>
  <text x="260" y="185" font-size="12" fill="#cbd5e1">Runs <tspan font-family="'Courier New', monospace" fill="#fbbf24">git diff</tspan> — detects changed files</text>

  <circle cx="244" cy="204" r="8" fill="rgba(245,158,11,0.15)"/>
  <text x="244" y="208" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="700">2</text>
  <text x="260" y="208" font-size="12" fill="#cbd5e1">Identifies components <tspan fill="#fbbf24" font-weight="600">missing stories</tspan></text>

  <circle cx="244" cy="227" r="8" fill="rgba(245,158,11,0.15)"/>
  <text x="244" y="231" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="700">3</text>
  <text x="260" y="231" font-size="12" fill="#cbd5e1">Passes component list to generator</text>

  <!-- Arrow down to storybook -->
  <line x1="400" y1="240" x2="400" y2="272" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STORYBOOK GENERATOR BOX ── -->
  <rect x="100" y="276" width="600" height="164" rx="12" fill="#12121a" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="100" y="276" width="600" height="4" rx="2" fill="url(#sbGrad)"/>

  <!-- sb label -->
  <text x="132" y="298" font-size="10" fill="#06b6d4" font-weight="700" letter-spacing="2" font-family="'Courier New', monospace">STORYBOOK GENERATOR</text>
  <text x="560" y="298" font-size="10" fill="#94a3b8">Claude Code Skill</text>

  <!-- sb steps — 2 columns -->
  <!-- left col -->
  <circle cx="124" cy="318" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="124" y="322" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">1</text>
  <text x="140" y="322" font-size="12" fill="#cbd5e1">Reads <tspan font-family="'Courier New', monospace" fill="#67e8f9">GUIDELINE.md</tspan> — project patterns</text>

  <circle cx="124" cy="342" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="124" y="346" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">2</text>
  <text x="140" y="346" font-size="12" fill="#cbd5e1">Analyzes component — hooks, context, API</text>

  <circle cx="124" cy="366" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="124" y="370" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">3</text>
  <text x="140" y="370" font-size="12" fill="#cbd5e1">Traces API calls &amp; <tspan fill="#67e8f9" font-weight="600">data transformations</tspan></text>

  <circle cx="124" cy="390" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="124" y="394" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">4</text>
  <text x="140" y="394" font-size="12" fill="#cbd5e1">Finds mocks in <tspan font-family="'Courier New', monospace" fill="#67e8f9">src/mocks/</tspan></text>

  <!-- right col -->
  <circle cx="424" cy="318" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="424" y="322" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">5</text>
  <text x="440" y="322" font-size="12" fill="#cbd5e1">Selects decorator pattern (1–4)</text>

  <circle cx="424" cy="342" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="424" y="346" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">6</text>
  <text x="440" y="346" font-size="12" fill="#cbd5e1">Generates story variants + play functions</text>

  <circle cx="424" cy="366" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="424" y="370" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">7</text>
  <text x="440" y="370" font-size="12" fill="#cbd5e1">Validates pitfalls — handlers, types, timeouts</text>

  <circle cx="424" cy="390" r="8" fill="rgba(6,182,212,0.15)"/>
  <text x="424" y="394" text-anchor="middle" font-size="9" fill="#06b6d4" font-weight="700">8</text>
  <text x="440" y="394" font-size="12" fill="#cbd5e1">Writes <tspan font-family="'Courier New', monospace" fill="#67e8f9">.stories.tsx</tspan> to <tspan font-family="'Courier New', monospace" fill="#67e8f9">src/stories/</tspan></text>

  <!-- Arrow down to output -->
  <line x1="400" y1="440" x2="400" y2="464" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── OUTPUT BOX ── -->
  <rect x="160" y="468" width="480" height="38" rx="10" fill="rgba(6,182,212,0.07)" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
  <text x="400" y="483" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="1">OUTPUT</text>
  <text x="400" y="498" text-anchor="middle" font-size="12" fill="#e2e8f0">✓ Providers  ✓ MSW handlers  ✓ Story variants  ✓ Play functions</text>

</svg>